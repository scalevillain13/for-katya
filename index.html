<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Для Кати — с любовью" />
    <meta property="og:title" content="Для Кати" />
    <meta property="og:description" content="Открой с любовью" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://scalevillain13.github.io/for-katya/" />
    <meta property="og:image" content="https://scalevillain13.github.io/for-katya/images/photo-4.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="900" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://scalevillain13.github.io/for-katya/images/photo-4.webp" />
    <meta name="theme-color" content="#d4847a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Для Кати" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Для Кати</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="scroll-progress" class="scroll-progress" aria-hidden="true">
      <div class="scroll-progress-bar" id="scroll-progress-bar"></div>
    </div>

    <div id="intro-overlay" class="intro-overlay" role="dialog" aria-label="Вход">
      <div class="intro-inner">
        <div class="intro-heart" aria-hidden="true">♥</div>
        <p class="intro-text" id="intro-text"></p>
        <p class="intro-hint" id="intro-hint"></p>
      </div>
    </div>

    <div id="easter-toast" class="easter-toast" aria-live="polite" hidden></div>
    <div id="confetti-layer" class="confetti-layer" aria-hidden="true"></div>
    <div id="hug-glow" class="hug-glow" aria-hidden="true"></div>
    <div id="hug-hearts" class="hug-hearts" aria-hidden="true"></div>

    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Фото" aria-hidden="true">
      <button type="button" class="lightbox-close" id="lightbox-close" aria-label="Закрыть">×</button>
      <button type="button" class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Предыдущее">‹</button>
      <button type="button" class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Следующее">›</button>
      <div class="lightbox-stage" id="lightbox-stage">
        <img id="lightbox-img" src="" alt="" />
        <div class="lightbox-meta">
          <p class="lightbox-caption" id="lightbox-caption"></p>
          <p class="lightbox-date" id="lightbox-date"></p>
          <p class="lightbox-counter" id="lightbox-counter"></p>
        </div>
      </div>
    </div>

    <div class="ambient-layer" id="ambient-global" aria-hidden="true"></div>

    <main id="main-content" class="main-content" hidden>
      <!-- HERO -->
      <section class="section section-hero" id="hero">
        <div class="ambient ambient-hero" aria-hidden="true"></div>
        <div class="section-inner hero-inner">
          <button class="hero-heart-btn" id="hero-heart-btn" type="button" aria-label="Сердечко">
            ♥
          </button>
          <h1 class="hero-headline" id="hero-headline"></h1>
          <p class="hero-subline" id="hero-subline"></p>
          <a href="#gallery" class="hero-cta" id="hero-cta">
            <span></span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 5v14M5 12l7 7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </a>
        </div>
      </section>

      <!-- GALLERY -->
      <section class="section section-gallery" id="gallery">
        <div class="ambient ambient-gallery" aria-hidden="true"></div>
        <button class="candy-easter" id="candy-easter" type="button" aria-label="Сладость"></button>
        <div class="section-inner">
          <h2 class="section-title gallery-title">Наши воспоминания</h2>
          <div class="gallery-grid" id="gallery-grid"></div>
        </div>
      </section>

      <!-- REASONS -->
      <section class="section section-reasons" id="reasons">
        <div class="ambient ambient-reasons" aria-hidden="true"></div>
        <div class="section-inner">
          <h2 class="section-title" id="reasons-title"></h2>
          <div class="reasons-grid" id="reasons-grid"></div>
        </div>
      </section>

      <!-- RITUALS -->
      <section class="section section-rituals" id="rituals">
        <div class="ambient ambient-rituals" aria-hidden="true"></div>
        <div class="section-inner">
          <h2 class="section-title" id="rituals-title"></h2>
          <div class="rituals-grid" id="rituals-grid"></div>
        </div>
      </section>

      <!-- CANVAS ART -->
      <section class="section section-art" id="art">
        <div class="ambient ambient-art" aria-hidden="true"></div>
        <div class="section-inner art-inner">
          <h2 class="section-title" id="art-title"></h2>
          <p class="art-subtitle" id="art-subtitle"></p>
          <div class="art-canvas-wrap">
            <canvas id="love-canvas" aria-label="Рисунок сердечка и цветов"></canvas>
          </div>
          <p class="art-label" id="art-label"></p>
          <button class="art-replay-btn" id="art-replay-btn" type="button">Нарисовать ещё раз ♥</button>
        </div>
      </section>

      <!-- LOVE NOTES -->
      <section class="section section-notes" id="notes">
        <div class="ambient ambient-notes" aria-hidden="true"></div>
        <div class="section-inner">
          <h2 class="section-title" id="notes-title"></h2>
          <div class="notes-list" id="notes-list"></div>
        </div>
      </section>

      <!-- COUNTER -->
      <section class="section section-counter" id="counter">
        <div class="ambient ambient-counter" aria-hidden="true"></div>
        <div class="section-inner counter-inner">
          <h2 class="section-title counter-title" id="counter-title"></h2>
          <div class="counter-display">
            <span class="counter-number" id="counter-number">0</span>
            <span class="counter-suffix" id="counter-suffix"></span>
          </div>
          <p class="counter-label" id="counter-label"></p>
        </div>
      </section>

      <!-- DISTANCE MAP -->
      <section class="section section-map" id="map">
        <div class="ambient ambient-map" aria-hidden="true"></div>
        <div class="section-inner map-inner">
          <h2 class="section-title" id="map-title"></h2>
          <div class="map-card">
            <svg class="map-svg" id="map-svg" viewBox="0 0 400 220" aria-hidden="true"></svg>
            <div class="map-labels">
              <div class="map-point map-point--from">
                <span class="map-point-dot"></span>
                <span class="map-point-name" id="map-from-label"></span>
              </div>
              <div class="map-point map-point--to">
                <span class="map-point-dot"></span>
                <span class="map-point-name" id="map-to-label"></span>
              </div>
            </div>
            <p class="map-stat" id="map-distance"></p>
            <p class="map-stat map-stat--warm" id="map-days"></p>
          </div>
        </div>
      </section>

      <!-- WISHES -->
      <section class="section section-wishes" id="wishes">
        <div class="ambient ambient-wishes" aria-hidden="true"></div>
        <div class="section-inner">
          <h2 class="section-title" id="wishes-title"></h2>
          <ul class="wishes-list" id="wishes-list"></ul>
        </div>
      </section>

      <!-- QUIZ -->
      <section class="section section-quiz" id="quiz">
        <div class="ambient ambient-quiz" aria-hidden="true"></div>
        <div class="section-inner">
          <h2 class="section-title" id="quiz-title"></h2>
          <p class="quiz-intro" id="quiz-intro"></p>
          <div class="quiz-card" id="quiz-card"></div>
        </div>
      </section>

      <!-- JAR -->
      <section class="section section-jar" id="jar">
        <div class="ambient ambient-jar" aria-hidden="true"></div>
        <div class="section-inner jar-inner">
          <h2 class="section-title" id="jar-title"></h2>
          <p class="jar-hint" id="jar-hint"></p>
          <div class="jar-display" id="jar-display">
            <span class="jar-icon" aria-hidden="true">🫙</span>
            <p class="jar-message" id="jar-message">...</p>
          </div>
          <button class="jar-btn" id="jar-btn" type="button"></button>
        </div>
      </section>

      <!-- HUG -->
      <section class="section section-hug" id="hug">
        <div class="ambient ambient-hug" aria-hidden="true"></div>
        <div class="section-inner hug-inner">
          <h2 class="section-title" id="hug-title"></h2>
          <p class="hug-hint" id="hug-hint"></p>
          <button class="hug-btn" id="hug-btn" type="button" aria-label="Виртуальное объятие">
            <span class="hug-btn-heart" aria-hidden="true">♥</span>
            <span class="hug-btn-text" id="hug-btn-text"></span>
          </button>
          <p class="hug-release" id="hug-release"></p>
        </div>
      </section>

      <!-- CLOSING -->
      <section class="section section-closing" id="closing">
        <div class="ambient ambient-closing" aria-hidden="true"></div>
        <div class="section-inner closing-inner">
          <p class="closing-message" id="closing-message"></p>
          <button class="closing-btn" id="closing-btn" type="button"></button>
          <p class="closing-hidden" id="closing-hidden" hidden></p>
          <div class="closing-flame" aria-hidden="true">♥</div>
          <button type="button" class="read-again-btn" id="read-again-btn"></button>
        </div>
      </section>
    </main>

    <script src="./content.js"></script>
    <script src="./icons.js"></script>
    <script src="./art.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
